<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Restricted</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .box {
      border: 1px solid #444;
      border-radius: 16px;
      padding: 24px 28px;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 20px rgba(255,255,255,0.08);
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Developer tools detected</h1>
    <p>Trang này đã bị chuyển sang chế độ bảo vệ.</p>
  </div>
</body>
</html>
