<!DOCTYPE html>

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Video nền -->
  <video autoplay muted loop id="bgVideo">

      NGUYỄN HÙNG

        </div>
        <button onclick="goTo('https://t.me/Kingcam08')">Telegram</button>

        <button onclick="goTo('https://www.facebook.com/HungNT.GDTG.VN')">Facebook</button>
      </div>
      <div class="icon-group">
        <div class="holographic-icon tiktok">
          <span class="holographic-ring"></span>

        </div>
        <button onclick="goTo('https://www.tiktok.com/@nth_hung08')">TikTok</button>
      </div>
      <div class="icon-group">
        <div class="holographic-icon zalo">
          <span class="holographic-ring"></span>
          <span class="holographic-particles"></span>
          <span class="holographic-pulse"></span>
          <i class="fas fa-comment-dots"></i>
        </div>
        <button onclick="goTo('https://zalo.me/0988085025')">Zalo</button>
      </div>
